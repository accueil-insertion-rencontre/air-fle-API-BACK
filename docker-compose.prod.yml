version: '3.8'

services:
  api-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: air-fle-api-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-prod:5432/airfle?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis-prod:6379
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=24h
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    networks:
      - air-fle-network-prod
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-prod:
    image: postgres:15-alpine
    container_name: air-fle-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=airfle
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - air-fle-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airfle"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-prod:
    image: redis:7-alpine
    container_name: air-fle-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data-prod:/data
    networks:
      - air-fle-network-prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  air-fle-network-prod:
    name: air-fle-network-prod
    driver: bridge

volumes:
  postgres-data-prod:
    name: air-fle-postgres-data-prod
  redis-data-prod:
    name: air-fle-redis-data-prod 