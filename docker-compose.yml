version: '3.8'

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: postgres-dev
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-airfle}
    env_file:
      - .env
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - airfle-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-airfle}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis-dev:
    image: redis:alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - airfle-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: api-dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres-dev:5432/airfle?schema=public}
      - REDIS_URL=redis://redis-dev:6379
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - PORT=${PORT:-3000}
    env_file:
      - .env
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    networks:
      - airfle-dev-network
    command: sh -c "npx prisma migrate deploy && npm run seed && npm run start:docker"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
      
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: prisma-studio
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres-dev:5432/airfle?schema=public}
      - BROWSER=none
    env_file:
      - .env
    depends_on:
      postgres-dev:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
    networks:
      - airfle-dev-network
    command: npx prisma studio --port 5555 --hostname 0.0.0.0 --browser none
    restart: unless-stopped

networks:
  airfle-dev-network:
    name: airfle-dev-network

volumes:
  postgres-dev-data:
    name: postgres-dev-data
  redis-dev-data:
    name: redis-dev-data 