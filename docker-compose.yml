version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airfle
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - airfle-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-api
    ports:
      - "3000:3000"
      - "9229:9229" # Port de débogage
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/airfle?schema=public
      - NODE_ENV=development
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - airfle-network
    command: sh -c "npx prisma migrate dev --name init && npm run start:docker"

networks:
  airfle-network:

volumes:
  postgres-data: 