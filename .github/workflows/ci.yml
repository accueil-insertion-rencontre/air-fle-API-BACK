name: 🚀 CI/CD Pipeline - Tests & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 🧪 Job Tests
  tests:
    name: 🧪 Tests (Student + Financing)
    runs-on: ubuntu-latest
    
    # 🗄️ Services (PostgreSQL + Redis)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: air_fle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      # 📥 Checkout du code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 🟢 Setup Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 📦 Installation des dépendances
      - name: 📦 Install dependencies
        run: npm ci

      # 🏗️ Build du projet
      - name: 🏗️ Build project
        run: npm run build

      # 🧹 Lint du code
      - name: 🧹 Run ESLint
        run: npm run lint

      # 🎨 Vérification format Prettier
      - name: 🎨 Check code formatting
        run: npm run format -- --check

      # 🗄️ Setup de la base de données
      - name: 🗄️ Setup database
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/air_fle_test
          JWT_SECRET: test_jwt_secret_for_ci_cd_pipeline_2024
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          npx prisma migrate deploy
          npx prisma generate

      # 🎓 Tests unitaires Student (34 tests)
      - name: 🎓 Run Student Unit Tests
        run: npm run test test/student/
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci_cd_pipeline_2024

      # 💰 Tests d'intégration Financing (7 tests)  
      - name: 💰 Run Financing Integration Tests
        run: npm run test test/financing/
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/air_fle_test
          JWT_SECRET: test_jwt_secret_for_ci_cd_pipeline_2024
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      # 🌍 Tous les tests avec coverage
      - name: 🌍 Run All Tests with Coverage
        run: npm run test:cov
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/air_fle_test
          JWT_SECRET: test_jwt_secret_for_ci_cd_pipeline_2024
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      # 📊 Upload coverage à Codecov (optionnel)
      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  # 🐳 Job Build Docker
  docker-build:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: tests
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t air-fle-api:test .

      - name: 🧪 Test Docker container
        run: |
          docker run --rm --name test-container \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e JWT_SECRET=test_secret \
            air-fle-api:test \
            npm run test -- --run

  # 📋 Job Résumé
  ci-summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [tests, docker-build]
    if: always()
    
    steps:
      - name: 📋 Display CI Results
        run: |
          echo "🎯 CI/CD Pipeline Results:"
          echo "=========================="
          echo "🧪 Tests Job: ${{ needs.tests.result }}"
          echo "🐳 Docker Build: ${{ needs.docker-build.result }}"
          echo ""
          echo "📊 Test Coverage:"
          echo "🎓 Student Tests: 34 tests unitaires"
          echo "💰 Financing Tests: 7 tests intégration"
          echo "🌍 Total: 41 tests fonctionnels"
          echo ""
          if [ "${{ needs.tests.result }}" == "success" ] && [ "${{ needs.docker-build.result }}" == "success" ]; then
            echo "✅ Statut Global: SUCCESS - Prêt pour déploiement!"
          else
            echo "❌ Statut Global: FAILURE - Corrections nécessaires"
            exit 1
          fi 